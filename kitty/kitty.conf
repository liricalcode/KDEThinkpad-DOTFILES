# ============================================================
# Kitty Terminal — ThinkPad E595 Config
# Hacker / Terminal theme with semi-transparent background
# Place this file at: ~/.config/kitty/kitty.conf
# ============================================================


# ── Transparency ─────────────────────────────────────────────
# 0.0 = fully transparent, 1.0 = fully opaque
# 0.82 gives a nice semi-transparent hacker feel
background_opacity 0.90

# Blur the content behind the window (compositor must support it)
# Works on KDE Plasma with Wayland or KWin effects enabled
background_blur 12


# ── Font ─────────────────────────────────────────────────────
# JetBrains Mono is clean and widely available on Arch.
# Swap to "FiraCode Nerd Font" or "Hack Nerd Font" if you prefer.
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        11.5

# Slightly tighter line spacing for that dense terminal feel
adjust_line_height  110%
adjust_column_width 100%


# ── Cursor ───────────────────────────────────────────────────
cursor                  #e8001c
cursor_text_color       #0a0a0a
cursor_shape            block
cursor_blink_interval   0.5
cursor_stop_blinking_after 0


# ── Colors: ThinkPad E595 ────────────────────────────────────

# Background & Foreground
background  #111111
foreground  #e8e8e8

# Selection (uses TrackPoint red)
selection_background  #e8001c
selection_foreground  #ffffff

# URL underline color
url_color  #4da6ff


# ── ANSI Color Table ─────────────────────────────────────────

# Black (normal + bright)
color0   #1a1a1a
color8   #3a3a3a

# Red (normal = muted red / bright = core TrackPoint red)
color1   #7a0010
color9   #e8001c

# Green (normal + bright = terminal green)
color2   #00b85e
color10  #00e57a

# Yellow / Amber
color3   #cc8f00
color11  #ffb300

# Blue (normal + bright)
color4   #2d7acc
color12  #4da6ff

# Magenta (used for purples/pinks — kept muted to fit the palette)
color5   #8b004d
color13  #cc0070

# Cyan (kept cool and dim to not clash with the green/blue)
color6   #007a8a
color14  #00b8cc

# White (normal = dim text / bright = primary text)
color7   #888888
color15  #e8e8e8


# ── Window Layout ────────────────────────────────────────────
window_padding_width    10
window_border_width     1pt

# Active window border = TrackPoint red
active_border_color     #e8001c
inactive_border_color   #2a2a2a
bell_border_color        #ffb300

# Tab bar
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted
active_tab_foreground    #ffffff
active_tab_background    #e8001c
inactive_tab_foreground  #888888
inactive_tab_background  #1a1a1a


# ── Scrollback ───────────────────────────────────────────────
scrollback_lines  10000


# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell   no
visual_bell_duration 0.1


# ── Performance ──────────────────────────────────────────────
# CachyOS is already optimized but these help kitty specifically
repaint_delay    8
input_delay      2
sync_to_monitor  yes


# ── Shell ────────────────────────────────────────────────────
# Set to your preferred shell after removing fish.
# Change to /bin/zsh or /bin/bash as needed.
shell /bin/zsh


# ── Key Bindings (sane defaults) ────────────────────────────
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+t  new_tab
map ctrl+shift+w  close_tab
map ctrl+shift+]  next_tab
map ctrl+shift+[  previous_tab
map ctrl+equal    change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+shift+r  load_config_file

# Override copy/paste to Ctrl+C / Ctrl+V
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

